name: CI/CD Pipeline to Render

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ----------------------------------------------------
  # CONTINUOUS INTEGRATION (CI) PHASE
  # ----------------------------------------------------
  ci-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Update this if you are using 3.9, 3.10, or 3.12 locally
          cache: 'pip' # Caches dependencies to speed up the pipeline

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs your app's dependencies
          pip install -r requirements.txt 
          # Installs tools needed strictly for the pipeline
          pip install flake8 pytest 

      - name: Run Linter (Code Quality)
        # Checks for critical Python syntax errors or undefined names
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true # We won't block the deployment for stylistic linting issues yet

      - name: Run Tests
        # This is the gatekeeper. If pytest fails, the pipeline stops here.
        run: pytest 

  # ----------------------------------------------------
  # CONTINUOUS DEPLOYMENT (CD) PHASE
  # ----------------------------------------------------
  cd-deploy-to-render:
    needs: ci-build-and-test 
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
